spring:
  application:
    name: cricket-app

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cricket}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  jackson:
    deserialization:
      fail-on-unknown-properties: true

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        globally_quoted_identifiers: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baselineOnMigrate: false
    cleanDisabled: true
    locations: classpath:db/migration

logging:
  level:
    root: WARN
    com.gmh.cricket_app: INFO
    org.flywaydb: INFO
    org.flywaydb.core.internal.schemahistory.JdbcTableSchemaHistory: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

session:
  duration:
    ms: 86400000   # 24 hours

cricket:
  match:
    id-length: 12
  team:
    id-length: 8
  squad:
    playing-xi-size: 11
    max-size: 15
  cache:
    scorecard:
      max-size: 500
      ttl-days: 7
    innings-list:
      max-size: 100
      ttl-seconds: 15