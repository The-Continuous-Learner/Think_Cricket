spring:
  application:
    name: cricket-app

  datasource:
    url: jdbc:mysql://localhost:3306/cricket?useSSL=false&serverTimezone=UTC
    username: myapp_user
    password: StrongPassword123!

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        globally_quoted_identifiers: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baselineOnMigrate: false
    cleanDisabled: true
    locations: classpath:db/migration

logging:
  level:
    org.flywaydb: DEBUG
    org.flywaydb.core.internal.schemahistory.JdbcTableSchemaHistory: DEBUG

session:
  duration:
    ms: 86400000   # 24 hours

cricket:
  match:
    id-length: 12
  team:
    id-length: 8