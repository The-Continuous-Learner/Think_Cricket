name: Build and Upload

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  S3_BUCKET: think-cricket-artifacts
  S3_KEY: think-cricket/app.jar

jobs:
  build:
    name: Build jar and upload to S3
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: maven

      - name: Build jar
        run: mvn package -DskipTests --no-transfer-progress

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload jar to S3
        run: |
          aws s3 cp target/cricket-app-0.0.1-SNAPSHOT.jar \
            s3://${{ env.S3_BUCKET }}/${{ env.S3_KEY }}

      - name: Confirm upload
        run: |
          aws s3 ls s3://${{ env.S3_BUCKET }}/${{ env.S3_KEY }}
